<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Debug Test</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    #testMap {
      width: 100%;
      height: 400px;
      border: 1px solid #ddd;
    }
    body { font-family: Arial, sans-serif; padding: 20px; }
  </style>
</head>
<body>
  <h1>Map Debug Test</h1>
  <div id="testMap"></div>
  <p>Status: <span id="status">Loading...</span></p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    let testMap;
    let statusElement = document.getElementById('status');

    try {
      statusElement.textContent = 'Initializing map...';

      // Default center: Kerala region
      const defaultLat = 10.8505;
      const defaultLng = 76.2711;

      testMap = L.map('testMap').setView([defaultLat, defaultLng], 13);

      // Add OSM tile layer
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(testMap);

      statusElement.textContent = 'Map loaded successfully!';

      // Add a test marker
      L.marker([defaultLat, defaultLng]).addTo(testMap)
        .bindPopup('Test marker in Kerala')
        .openPopup();

    } catch (error) {
      statusElement.textContent = 'Error: ' + error.message;
      console.error('Map initialization error:', error);
    }
  </script>
</body>
</html>
