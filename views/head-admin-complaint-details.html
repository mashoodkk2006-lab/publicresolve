<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PublicResolve — Where complaints turn into solutions. | Complaint Details - Head Admin</title>
  <meta name="description" content="PublicResolve — Where complaints turn into solutions.">
  <link rel="stylesheet" href="/css/style.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <!-- Leaflet Routing Machine CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.min.css" />
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 0;">
  <div class="navbar" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
    <h1>Complaint Details</h1>
    <div class="navbar-links">
      <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
      <a href="/admin-head-dashboard.html">Dashboard</a>
      <button onclick="adminLogout()">Logout</button>
    </div>
  </div>

  <div class="large-container">
    <div class="dashboard-container" style="max-width: 900px; margin: 0 auto;">
      <div id="alert" class="alert"></div>

      <!-- Complaint Info -->
      <div id="complaintInfo"></div>

      <!-- Routing Section -->
      <div id="routingSection" style="display: none; margin-top: 30px;">
        <h3>🗺️ Get Directions to Complaint Location</h3>
        <div class="card">
          <div id="routingMap" style="width: 100%; height: 400px; border-radius: 5px; margin-bottom: 15px;"></div>
          <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
            <button id="getCurrentLocation" class="btn btn-info">📍 Use My Current Location</button>
            <button id="setCustomStart" class="btn btn-secondary">🎯 Set Custom Start Point</button>
            <button id="clearRoute" class="btn btn-warning">🗑️ Clear Route</button>
            <button id="copyLocationLink" class="btn btn-primary">🔗 Copy Location Link</button>
            <button id="shareLocationEmail" class="btn btn-success">✉️ Share To Worker (Email)</button>
          </div>
          <div id="routeInstructions" style="display: none;">
            <h4>Route Instructions:</h4>
            <div id="instructionsList" style="max-height: 200px; overflow-y: auto; padding: 10px; background: #f9f9f9; border-radius: 5px;"></div>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <h3 style="margin-top: 30px;">Correspondence</h3>
      <div id="messages-container" class="messages-container"></div>

      <!-- Send Message Form -->
      <form id="messageForm">
        <div class="form-group">
          <label for="message">Send Message to User</label>
          <textarea id="message" name="message" placeholder="Type your message..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>

      <a href="/admin-head-dashboard.html" class="btn btn-secondary mt-20" style="display: block; text-align: center;">Back to Dashboard</a>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <!-- Leaflet JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <!-- Leaflet Routing Machine JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.min.js"></script>
  <script>
    const complaintId = getQueryParam('id');

    // Check session on page load
    async function checkSession() {
      try {
        const sessionResult = await fetch('/admin/check-session').then(r => r.json());
        console.log('Session check result:', sessionResult);
        
        if (!sessionResult.isLoggedIn || sessionResult.role !== 'head') {
          console.error('Not logged in as head admin, redirecting to login');
          showAlert('Please login as head admin', 'error');
          setTimeout(() => {
            window.location.href = '/admin-login.html';
          }, 2000);
          return false;
        }
        return true;
      } catch (error) {
        console.error('Session check error:', error);
        return false;
      }
    }

    async function loadMessages() {
      if (!complaintId) {
        showAlert('Invalid complaint ID', 'error');
        return;
      }

      try {
        showLoading();
        console.log('Loading complaint details for ID:', complaintId);
        const result = await apiCall('GET', `/admin/head/complaint/${complaintId}`);
        console.log('Complaint API response:', result);
        
        if (!result) {
          throw new Error('No response from server');
        }
        if (!result.complaint) {
          throw new Error('Invalid response from server - missing complaint data');
        }
        
        const complaint = result.complaint;
        // expose complaint to other handlers (share button etc.)
        currentComplaint = complaint;
        const messages = result.correspondence || [];

        // Display complaint info with user details
        document.getElementById('complaintInfo').innerHTML = `
          <div class="card">
            <div class="card-title">Department: ${complaint.department}</div>
            <span class="card-badge badge-${complaint.status.toLowerCase().replace(' ', '-')}">${complaint.status}</span>
            <p class="card-text"><strong>District:</strong> ${complaint.district || 'N/A'}</p>
            <p class="card-text"><strong>Location:</strong> ${complaint.location}</p>
            <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
              <button id="copyLocationLinkBtn" class="btn btn-small" style="background:#007bff;color:#fff;padding:6px 10px;border-radius:4px;border:none;">🔗 Copy Location Link</button>
              <button id="shareLocationEmailBtn" class="btn btn-small" style="background:#28a745;color:#fff;padding:6px 10px;border-radius:4px;border:none;">✉️ Share To Worker</button>
            </div>
            <p class="card-text"><strong>Description:</strong> ${complaint.complaint_text}</p>
            <p class="card-text text-muted"><strong>Filed on:</strong> ${formatDate(complaint.created_at)}</p>
            <hr style="margin: 15px 0; border: none; border-top: 1px solid #ddd;">
            <p class="card-text"><strong>User Information:</strong></p>
            <p class="card-text">Name: ${complaint.full_name || 'N/A'}</p>
            <p class="card-text">Email: ${complaint.email || 'N/A'}</p>
            <p class="card-text">Phone: ${complaint.phone || 'N/A'}</p>
            <p class="card-text">Address: ${complaint.address || 'N/A'}</p>
            <hr style="margin: 15px 0; border: none; border-top: 1px solid #ddd;">
            <p class="card-text"><strong>Complaint Proof:</strong></p>
            <img src="/image/complaint-proof/${complaint.id}" alt="Complaint Proof" style="max-width: 100%; height: auto; border-radius: 5px; cursor: pointer;" onclick="viewProof('/image/complaint-proof/${complaint.id}')">
            ${complaint.status === 'Resolved' ? `
              <hr style="margin: 15px 0; border: none; border-top: 1px solid #ddd;">
              <p class="card-text"><strong>Resolution Proof:</strong></p>
              <img src="/image/resolution-proof/${complaint.id}" alt="Resolution Proof" style="max-width: 100%; height: auto; border-radius: 5px; cursor: pointer;" onclick="viewProof('/image/resolution-proof/${complaint.id}')">
            ` : ''}
          </div>
        `;

        // Initialize routing if coordinates are available
        // Attach copy/share handlers for location (works with coords or plain address)
        const attachCopyShare = () => {
          const copyBtn = document.getElementById('copyLocationLinkBtn');
          const shareBtn = document.getElementById('shareLocationEmailBtn');

          const makeLink = () => {
            if (complaint.latitude && complaint.longitude) {
              return generateLocationLink(complaint.latitude, complaint.longitude);
            }
            const addr = complaint.location || complaint.address || '';
            return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}`;
          };

          if (copyBtn) copyBtn.addEventListener('click', () => {
            const link = makeLink();
            copyTextToClipboard(link).then(() => showAlert('Location link copied to clipboard', 'success')).catch(err => {
              console.error('Clipboard copy failed:', err);
              showAlert('Could not copy link. Please copy manually: ' + link, 'error');
            });
          });

          if (shareBtn) shareBtn.addEventListener('click', () => {
            const defaultEmail = complaint.assigned_worker_email || currentComplaint && currentComplaint.assigned_worker_email ? (complaint.assigned_worker_email || currentComplaint.assigned_worker_email) : '';
            const workerEmail = prompt('Enter worker email to share location (leave empty to open mail client):', defaultEmail);
            const link = makeLink();
            const subject = encodeURIComponent('Complaint location');
            const body = encodeURIComponent(`Please attend to the complaint at the following location:\n\n${link}\n\nComplaint ID: ${complaintId}\nAddress: ${complaint.location || 'N/A'}`);

            if (workerEmail) {
              window.location.href = `mailto:${encodeURIComponent(workerEmail)}?subject=${subject}&body=${body}`;
            } else {
              window.location.href = `mailto:?subject=${subject}&body=${body}`;
            }
          });
        };

        attachCopyShare();

        if (complaint.latitude && complaint.longitude) {
          initializeRouting(complaint.latitude, complaint.longitude, complaint.location);
        }

        // Display messages
        const messagesContainer = document.getElementById('messages-container');
        if (messages.length === 0) {
          messagesContainer.innerHTML = '<p class="text-center text-muted">No messages yet. Start a conversation with the user.</p>';
        } else {
          messagesContainer.innerHTML = messages.map(msg => `
            <div class="message ${msg.sender_role}">
              <div class="message-text">${msg.message}</div>
              <div class="message-time">
                <strong>${msg.sender_role === 'user' ? 'User' : 'You (Head Admin)'}</strong> - ${formatDate(msg.created_at)}
              </div>
            </div>
          `).join('');
          
          // Scroll to bottom
          messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
      } catch (error) {
        console.error('Load messages error:', error);
        const errorMsg = error.message || 'Unknown error occurred';
        showAlert(`Failed to load complaint details: ${errorMsg}`, 'error');
      } finally {
        hideLoading();
      }
    }

    document.getElementById('messageForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const message = document.getElementById('message').value;

      if (!message.trim()) {
        showAlert('Message cannot be empty', 'error');
        return;
      }

      try {
        showLoading();
        const result = await apiCall('POST', `/admin/head/complaint/${complaintId}/message`, { message });
        
        if (result.success) {
          document.getElementById('message').value = '';
          showAlert('Message sent!', 'success');
          // Reload messages
          await loadMessages();
        }
      } catch (error) {
        console.error('Send message error:', error);
        showAlert('Error sending message', 'error');
      } finally {
        hideLoading();
      }
    });

    // Load messages on page load
    window.addEventListener('load', async () => {
      const isLoggedIn = await checkSession();
      if (isLoggedIn) {
        await loadMessages();
      }
    });

    // Routing functionality
    let routingMap;
    let routingControl;
    let startMarker;
    let endMarker;
    let currentStartLatLng = null;
    let currentComplaint = null;

    function initializeRouting(destLat, destLng, destAddress) {
      console.log('Initializing routing to:', destLat, destLng, destAddress);

      // Show routing section
      document.getElementById('routingSection').style.display = 'block';

      // Initialize map
      const defaultLat = 10.8505;
      const defaultLng = 76.2711;

      routingMap = L.map('routingMap').setView([defaultLat, defaultLng], 10);

      // Add tile layer
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(routingMap);

      // Add destination marker
      endMarker = L.marker([destLat, destLng], {
        icon: L.icon({
          iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
          shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
          iconSize: [25, 41],
          iconAnchor: [12, 41],
          popupAnchor: [1, -34],
          shadowSize: [41, 41]
        })
      }).addTo(routingMap)
      .bindPopup(`<b>Complaint Location</b><br>${destAddress}`)
      .openPopup();

      // Center map on destination
      routingMap.setView([destLat, destLng], 15);

      // Add event listeners
      document.getElementById('getCurrentLocation').addEventListener('click', () => {
        getCurrentLocation(destLat, destLng);
      });

      document.getElementById('setCustomStart').addEventListener('click', () => {
        setCustomStartPoint(destLat, destLng);
      });

      document.getElementById('clearRoute').addEventListener('click', () => {
        clearRoute();
      });

      // Copy / Share buttons
      const copyBtn = document.getElementById('copyLocationLink');
      const shareBtn = document.getElementById('shareLocationEmail');

      if (copyBtn) copyBtn.addEventListener('click', () => {
        const link = generateLocationLink(destLat, destLng);
        copyTextToClipboard(link).then(() => {
          showAlert('Location link copied to clipboard', 'success');
        }).catch(err => {
          console.error('Clipboard copy failed:', err);
          showAlert('Could not copy link. Please copy manually: ' + link, 'error');
        });
      });

      if (shareBtn) shareBtn.addEventListener('click', () => {
        // Try to get assigned worker email from complaint data if available
        const defaultEmail = (currentComplaint && currentComplaint.assigned_worker_email) ? currentComplaint.assigned_worker_email : '';
        const workerEmail = prompt('Enter worker email to share location (leave empty to open mail client):', defaultEmail);
        const link = generateLocationLink(destLat, destLng);
        const subject = encodeURIComponent('Complaint location');
        const body = encodeURIComponent(`Please attend to the complaint at the following location:\n\n${link}\n\nComplaint ID: ${complaintId}\nAddress: ${destAddress || 'N/A'}`);

        if (workerEmail) {
          // Open mail client with recipient
          window.location.href = `mailto:${encodeURIComponent(workerEmail)}?subject=${subject}&body=${body}`;
        } else {
          // Open mail client without recipient so user can choose method
          window.location.href = `mailto:?subject=${subject}&body=${body}`;
        }
      });
    }

    function generateLocationLink(lat, lng) {
      // Prefer Google Maps quick link; also include OpenStreetMap as fallback
      return `https://www.google.com/maps?q=${lat},${lng}`;
    }

    function copyTextToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      return new Promise((resolve, reject) => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          document.body.removeChild(textarea);
          resolve();
        } catch (err) {
          document.body.removeChild(textarea);
          reject(err);
        }
      });
    }

    function getCurrentLocation(destLat, destLng) {
      if (!navigator.geolocation) {
        showAlert('Geolocation is not supported by your browser', 'error');
        return;
      }

      showAlert('Getting your current location...', 'info');

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const startLat = position.coords.latitude;
          const startLng = position.coords.longitude;
          createRoute(startLat, startLng, destLat, destLng);
          showAlert('Location obtained successfully!', 'success');
        },
        (error) => {
          console.error('Geolocation error:', error);
          showAlert('Unable to get your location. Please try again or set a custom start point.', 'error');
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    function setCustomStartPoint(destLat, destLng) {
      showAlert('Click on the map to set your starting point', 'info');

      const clickHandler = (e) => {
        const startLat = e.latlng.lat;
        const startLng = e.latlng.lng;
        createRoute(startLat, startLng, destLat, destLng);
        routingMap.off('click', clickHandler);
        showAlert('Starting point set successfully!', 'success');
      };

      routingMap.on('click', clickHandler);
    }

    function createRoute(startLat, startLng, destLat, destLng) {
      // Clear existing route
      if (routingControl) {
        routingMap.removeControl(routingControl);
      }
      if (startMarker) {
        routingMap.removeLayer(startMarker);
      }

      // Add start marker
      startMarker = L.marker([startLat, startLng], {
        icon: L.icon({
          iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
          shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
          iconSize: [25, 41],
          iconAnchor: [12, 41],
          popupAnchor: [1, -34],
          shadowSize: [41, 41]
        })
      }).addTo(routingMap)
      .bindPopup('<b>Your Starting Point</b>')
      .openPopup();

      // Create routing control
      routingControl = L.Routing.control({
        waypoints: [
          L.latLng(startLat, startLng),
          L.latLng(destLat, destLng)
        ],
        routeWhileDragging: false,
        createMarker: () => null, // Don't create default markers
        lineOptions: {
          styles: [{ color: '#007bff', weight: 6, opacity: 0.8 }]
        }
      }).addTo(routingMap);

      // Show route instructions
      routingControl.on('routesfound', function(e) {
        const routes = e.routes;
        const instructions = routes[0].instructions;

        let instructionsHTML = '';
        instructions.forEach((instruction, index) => {
          instructionsHTML += `<div style="margin-bottom: 8px;">
            <strong>${index + 1}.</strong> ${instruction.text}
            <span style="color: #666;">(${Math.round(instruction.distance)}m)</span>
          </div>`;
        });

        document.getElementById('instructionsList').innerHTML = instructionsHTML;
        document.getElementById('routeInstructions').style.display = 'block';
      });

      // Fit map to show both points
      const group = new L.featureGroup([startMarker, endMarker]);
      routingMap.fitBounds(group.getBounds().pad(0.1));
    }

    function clearRoute() {
      if (routingControl) {
        routingMap.removeControl(routingControl);
        routingControl = null;
      }
      if (startMarker) {
        routingMap.removeLayer(startMarker);
        startMarker = null;
      }
      document.getElementById('routeInstructions').style.display = 'none';
      document.getElementById('instructionsList').innerHTML = '';
      showAlert('Route cleared', 'info');
    }
  </script>
  <script>
    // Persistent floating share toolbar (helps when complaintInfo isn't rendered yet)
    (function createFloatingToolbar() {
      const toolbar = document.createElement('div');
      toolbar.id = 'share-toolbar';
      toolbar.style.cssText = 'position:fixed;right:16px;bottom:24px;z-index:2000;display:flex;flex-direction:column;gap:8px;';

      const copyBtn = document.createElement('button');
      copyBtn.textContent = '🔗 Copy Location';
      copyBtn.style.cssText = 'background:#007bff;color:#fff;border:none;padding:10px 12px;border-radius:6px;cursor:pointer;';
      copyBtn.onclick = async () => {
        let link = '';
        if (currentComplaint && (currentComplaint.latitude && currentComplaint.longitude)) {
          link = generateLocationLink(currentComplaint.latitude, currentComplaint.longitude);
        } else if (complaintId) {
          try {
            const res = await fetch(`/admin/head/complaint/${complaintId}`).then(r => r.json());
            const c = res.complaint;
            if (c && c.latitude && c.longitude) link = generateLocationLink(c.latitude, c.longitude);
            else if (c && c.location) link = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.location)}`;
          } catch (e) { console.error('Failed to fetch complaint for link', e); }
        }

        if (!link) {
          const addrOrCoords = prompt('Enter address or coordinates (lat,lng):');
          if (!addrOrCoords) return;
          if (addrOrCoords.includes(',')) {
            link = `https://www.google.com/maps?q=${encodeURIComponent(addrOrCoords)}`;
          } else {
            link = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addrOrCoords)}`;
          }
        }

        try {
          await copyTextToClipboard(link);
          showAlert('Location link copied to clipboard', 'success');
        } catch (err) {
          console.error('Clipboard copy failed:', err);
          alert('Copy failed. Link:\n' + link);
        }
      };

      const shareBtn = document.createElement('button');
      shareBtn.textContent = '✉️ Share (Email)';
      shareBtn.style.cssText = 'background:#28a745;color:#fff;border:none;padding:10px 12px;border-radius:6px;cursor:pointer;';
      shareBtn.onclick = async () => {
        let link = '';
        let address = '';
        if (currentComplaint && (currentComplaint.latitude && currentComplaint.longitude)) {
          link = generateLocationLink(currentComplaint.latitude, currentComplaint.longitude);
          address = currentComplaint.location || '';
        } else if (complaintId) {
          try {
            const res = await fetch(`/admin/head/complaint/${complaintId}`).then(r => r.json());
            const c = res.complaint;
            if (c && c.latitude && c.longitude) link = generateLocationLink(c.latitude, c.longitude);
            else if (c && c.location) link = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.location)}`;
            address = c.location || '';
          } catch (e) { console.error('Failed to fetch complaint for share', e); }
        }

        if (!link) {
          const addrOrCoords = prompt('Enter address or coordinates (lat,lng):');
          if (!addrOrCoords) return;
          if (addrOrCoords.includes(',')) {
            link = `https://www.google.com/maps?q=${encodeURIComponent(addrOrCoords)}`;
          } else {
            link = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addrOrCoords)}`;
          }
          address = addrOrCoords;
        }

        const defaultEmail = (currentComplaint && currentComplaint.assigned_worker_email) ? currentComplaint.assigned_worker_email : '';
        const workerEmail = prompt('Enter worker email to share location (leave empty to open mail client):', defaultEmail);
        const subject = encodeURIComponent('Complaint location');
        const body = encodeURIComponent(`Please attend to the complaint at the following location:\n\n${link}\n\nComplaint ID: ${complaintId || 'N/A'}\nAddress: ${address || 'N/A'}`);
        if (workerEmail) window.location.href = `mailto:${encodeURIComponent(workerEmail)}?subject=${subject}&body=${body}`;
        else window.location.href = `mailto:?subject=${subject}&body=${body}`;
      };

      toolbar.appendChild(copyBtn);
      toolbar.appendChild(shareBtn);
      document.body.appendChild(toolbar);
    })();
  </script>
</body>
</html>
