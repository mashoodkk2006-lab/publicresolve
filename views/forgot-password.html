<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PublicResolve — Where complaints turn into solutions. | Forgot Password</title>
  <meta name="description" content="PublicResolve — Where complaints turn into solutions.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container" style="max-width: 450px; margin-top: 60px;">
    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px; border-radius: 15px; box-shadow: 0 5px 30px rgba(0,0,0,0.2);">
      <h1 style="color: white; text-align: center; margin-bottom: 10px;">Reset Password</h1>
      <p style="text-align: center; color: rgba(255,255,255,0.9); margin-bottom: 30px; font-size: 14px;">We'll help you recover your account</p>

      <div id="alert" class="alert"></div>

      <!-- Step 1: Phone Verification -->
      <div id="step1-container">
        <form id="phoneVerificationForm">
          <div class="form-group">
            <label for="mobile" style="color: white; font-weight: 600;">Mobile Number</label>
            <input type="tel" id="mobile" name="mobile" placeholder="Enter your registered mobile number" pattern="[0-9]{10}" required>
            <small style="color: rgba(255,255,255,0.8);">Format: 10 digits (e.g., 9876543210)</small>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; background: white; color: #667eea; font-weight: bold; padding: 12px; font-size: 16px;">Send OTP</button>
        </form>
      </div>

      <!-- Step 2: OTP Verification -->
      <div id="step2-container" style="display: none;">
        <form id="otpVerificationForm">
          <p style="color: rgba(255,255,255,0.9); margin-bottom: 20px; text-align: center;">
            OTP has been sent to your mobile number
          </p>

          <div class="form-group">
            <label for="otp" style="color: white; font-weight: 600;">Enter OTP</label>
            <input type="text" id="otp" name="otp" placeholder="Enter 6-digit OTP" pattern="[0-9]{6}" maxlength="6" required>
            <small style="color: rgba(255,255,255,0.8);">A 6-digit code was sent to your phone</small>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; background: white; color: #667eea; font-weight: bold; padding: 12px; font-size: 16px;">Verify OTP</button>

          <p class="text-center mt-15">
            <button type="button" onclick="goBackToPhone()" style="background: none; border: none; color: rgba(255,255,255,0.9); cursor: pointer; text-decoration: underline;">Back to Phone Number</button>
          </p>
        </form>
      </div>

      <!-- Step 3: Password Reset -->
      <div id="step3-container" style="display: none;">
        <form id="passwordResetForm">
          <p style="color: rgba(255,255,255,0.9); margin-bottom: 20px; text-align: center;">
            ✓ Phone verified! Set your new password
          </p>

          <div class="form-group">
            <label for="newPassword" style="color: white; font-weight: 600;">New Password</label>
            <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" minlength="6" required>
            <small style="color: rgba(255,255,255,0.8);">At least 6 characters</small>
          </div>

          <div class="form-group">
            <label for="confirmPassword" style="color: white; font-weight: 600;">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" minlength="6" required>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; background: white; color: #667eea; font-weight: bold; padding: 12px; font-size: 16px;">Reset Password</button>
        </form>
      </div>

      <p class="text-center mt-20">
        <a href="/login.html" style="color: rgba(255,255,255,0.9); text-decoration: none;">← Back to Login</a>
      </p>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    let storedMobile = null;
    let storedOtp = null;

    // Step 1: Phone Verification
    document.getElementById('phoneVerificationForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const mobile = document.getElementById('mobile').value.trim();

      if (!mobile || mobile.length !== 10) {
        showAlert('Please enter a valid 10-digit mobile number', 'error');
        return;
      }

      try {
        showLoading();
        const response = await fetch('/forgot-password-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mobile })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          storedMobile = mobile;
          storedOtp = result.otp; // For testing purposes (in production, don't send this to frontend)
          
          showAlert('OTP sent to your mobile number', 'success');
          
          // Show OTP in console for testing (in production, remove this)
          console.log('🔐 [DEV ONLY] Your OTP is:', result.otp);
          
          // Move to step 2
          document.getElementById('step1-container').style.display = 'none';
          document.getElementById('step2-container').style.display = 'block';
        } else {
          showAlert(result.error || 'Mobile number not found', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        showAlert('Error sending OTP: ' + error.message, 'error');
      } finally {
        hideLoading();
      }
    });

    // Step 2: OTP Verification
    document.getElementById('otpVerificationForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const otp = document.getElementById('otp').value.trim();

      if (!otp || otp.length !== 6) {
        showAlert('Please enter a valid 6-digit OTP', 'error');
        return;
      }

      try {
        showLoading();
        const response = await fetch('/forgot-password-verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mobile: storedMobile, otp })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          showAlert('OTP verified successfully', 'success');
          
          // Move to step 3
          document.getElementById('step2-container').style.display = 'none';
          document.getElementById('step3-container').style.display = 'block';
        } else {
          showAlert(result.error || 'Invalid OTP', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        showAlert('Error verifying OTP: ' + error.message, 'error');
      } finally {
        hideLoading();
      }
    });

    // Step 3: Password Reset
    document.getElementById('passwordResetForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!newPassword || newPassword.length < 6) {
        showAlert('Password must be at least 6 characters', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showAlert('Passwords do not match', 'error');
        return;
      }

      try {
        showLoading();
        const response = await fetch('/forgot-password-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mobile: storedMobile, newPassword })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          showAlert('Password reset successfully! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 2000);
        } else {
          showAlert(result.error || 'Failed to reset password', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        showAlert('Error resetting password: ' + error.message, 'error');
      } finally {
        hideLoading();
      }
    });

    // Helper function to go back to phone entry
    function goBackToPhone() {
      document.getElementById('step2-container').style.display = 'none';
      document.getElementById('step1-container').style.display = 'block';
      document.getElementById('otp').value = '';
    }
  </script>
</body>
</html>
